name: Build and Deploy Front

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build image
        run: docker build -t arthenyo/frotapro-front:latest .

      - name: Push image
        run: docker push arthenyo/frotapro-front:latest

      - name: Deploy locally (VM)
        run: |
          cd /home/frotapro/deploy/frotapro
          docker compose pull front
          docker compose up -d front
          docker logs --tail=100 frotapro-front
